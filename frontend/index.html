<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1b4332" />
    <meta
      name="description"
      content="Corporate Enterprise Resource Planning system by ORBX Corporation"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>OrbX Enterprise Suite</title>
    <style>
      body, html {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
    </style>
    <script>
      // Automatically reload the page when a chunk or script fails to load (due to hash mismatches in new deployments)
      window.addEventListener('error', function (e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          const url = e.target.src || e.target.href;
          if (url && (url.includes('.js') || url.includes('.css'))) {
            console.warn('Script/Style chunk load error detected. Reloading page for latest assets...', url);
            window.location.reload(true);
          }
        }
      }, true);

      window.addEventListener('vite:preloadError', function (event) {
        console.warn('Vite preload error detected. Reloading page for latest assets...');
        window.location.reload(true);
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
