server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # CRITICAL: Never cache index.html so browsers always fetch the latest JS bundle hashes!
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # CRITICAL: Never cache service worker so update checks are instant
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Serve PWA manifest with correct header and brief caching
    location = /manifest.json {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
    }

    # Serve static assets with long cache lifetime, returning 404 directly if missing
    location ~* \.(?:css|js|map|jpe?g|png|gif|ico|svg|woff2?|json)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
